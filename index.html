<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Dash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Fredoka', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0533 0%, #2d1b69 30%, #44107a 60%, #1a0533 100%);
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* Coin particles */
        .coin {
            width: 12px; height: 12px;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }

        .sparkle {
            width: 6px; height: 6px;
            background: #fff;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        /* Logo */
        .logo-wrap {
            animation: dropIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        @keyframes dropIn {
            0% { transform: translateY(-60px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .logo {
            max-width: 90%;
            height: auto;
            filter: drop-shadow(0 8px 24px rgba(255, 215, 0, 0.3));
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05) rotate(-1deg);
        }

        /* Tagline */
        .tagline {
            font-size: 1.3em;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            margin: 20px 0 10px;
            animation: fadeUp 0.8s 0.3s ease forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .tagline-sub {
            font-size: 0.95em;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            animation: fadeUp 0.8s 0.5s ease forwards;
            opacity: 0;
        }

        /* CTA Button */
        .cta {
            display: inline-block;
            padding: 16px 48px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2em;
            font-weight: 700;
            color: #1a0533;
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            border: none;
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 170, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            animation: fadeUp 0.8s 0.7s ease forwards;
            opacity: 0;
        }

        .cta:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 170, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .cta:active {
            transform: translateY(0) scale(0.98);
        }

        /* Feature cards */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin: 50px 0 40px;
        }

        .feature {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px 16px;
            transition: all 0.3s ease;
            animation: fadeUp 0.8s ease forwards;
            opacity: 0;
        }

        .feature:nth-child(1) { animation-delay: 0.9s; }
        .feature:nth-child(2) { animation-delay: 1.0s; }
        .feature:nth-child(3) { animation-delay: 1.1s; }

        .feature:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .feature-icon {
            font-size: 2em;
            margin-bottom: 8px;
        }

        .feature-title {
            font-weight: 700;
            font-size: 1.05em;
            margin-bottom: 4px;
        }

        .feature-desc {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.4;
        }

        /* Footer links */
        .footer {
            margin-top: 40px;
            padding: 20px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            animation: fadeUp 0.8s 1.3s ease forwards;
            opacity: 0;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.85em;
            margin: 0 16px;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #ffd700;
        }

        /* Pulse glow behind logo */
        .glow {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 170, 0, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.5; }
            50% { transform: translateX(-50%) scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="glow"></div>

    <div class="container">
        <div class="logo-wrap">
            <img src="logo.png" alt="Brainrot Dash" class="logo">
        </div>

        <p class="tagline">The ultimate brainrot gaming experience.</p>
        <p class="tagline-sub">Dash. Collect. Go brainrot.</p>

        <a href="#" class="cta">Coming Soon</a>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">&#127922;</div>
                <div class="feature-title">Endless Dash</div>
                <div class="feature-desc">Run through meme-filled worlds that never end</div>
            </div>
            <div class="feature">
                <div class="feature-icon">&#128176;</div>
                <div class="feature-title">Coin Frenzy</div>
                <div class="feature-desc">Collect coins, unlock skins, flex on friends</div>
            </div>
            <div class="feature">
                <div class="feature-icon">&#127775;</div>
                <div class="feature-title">Pure Brainrot</div>
                <div class="feature-desc">Maximum chaos, minimum braincells required</div>
            </div>
        </div>

        <div class="footer">
            <a href="terms.html">Terms of Service</a>
            <a href="privacy.html">Privacy Policy</a>
        </div>
    </div>

    <script>
        // Generate floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            const isCoin = Math.random() > 0.5;
            p.className = `particle ${isCoin ? 'coin' : 'sparkle'}`;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (6 + Math.random() * 10) + 's';
            p.style.animationDelay = (Math.random() * 8) + 's';
            if (!isCoin) {
                const size = 3 + Math.random() * 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
            }
            container.appendChild(p);
        }
    </script>
</body>
</html>
